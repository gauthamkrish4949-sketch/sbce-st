<!DOCTYPE html>
<html>
<head>
    <title>Your Cart | Uni Store SBCE</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 50px 20px; margin: 0; }
        .cart-box { max-width: 700px; margin: auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { color: #2c3e50; border-bottom: 2px solid #f4f7f6; padding-bottom: 20px; margin-top: 0; }
        table { width: 100%; border-collapse: collapse; margin: 25px 0; }
        th, td { text-align: left; padding: 15px; border-bottom: 1px solid #f4f7f6; }
        .grand-total { text-align: right; font-size: 1.8rem; font-weight: bold; color: #27ae60; margin: 20px 0; }
        .btn-checkout { background: #2c3e50; color: white; padding: 18px; border-radius: 12px; text-decoration: none; text-align: center; font-size: 1.2rem; font-weight: bold; display: block; transition: 0.3s; }
        .btn-checkout:hover { background: #34495e; transform: translateY(-2px); }
        .empty-msg { text-align: center; padding: 40px; color: #7f8c8d; }
    </style>
</head>
<body>
    <div class="cart-box">
        <h1>Shopping Cart 🛒</h1>
        {% if items %}
            <table>
                <thead>
                    <tr><th>Product</th><th>Qty</th><th>Subtotal</th></tr>
                </thead>
                <tbody>
                    {% for i in items %}
                    <tr>
                        <td><strong>{{ i.name }}</strong></td>
                        <td>{{ i.qty }}</td>
                        <td>₹{{ i.total }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            <div class="grand-total">Total: ₹{{ grand_total }}</div>
            
            <a href="/checkout" class="btn-checkout">Proceed to Checkout</a>
            
            <p style="text-align: center; margin-top: 20px;">
                <a href="/clear" style="color: #e74c3c; text-decoration: none;">Empty Cart</a> | 
                <a href="/" style="color: #3498db; text-decoration: none;">Back to Shop</a>
            </p>
        {% else %}
            <div class="empty-msg">
                <p>Your cart is empty.</p>
                <a href="/" class="btn-checkout" style="background: #3498db;">Go Shopping</a>
            </div>
        {% endif %}
    </div>
</body>
</html>
