<!DOCTYPE html>
<html>
<head>
    <title>Admin Portal | SBCE Store</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .admin-card { background: white; padding: 40px; border-radius: 20px; width: 350px; text-align: center; border-top: 8px solid #e67e22; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        .btn-admin { width: 100%; padding: 12px; background: #e67e22; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="admin-card">
        <h2 style="color: #e67e22;">Admin Portal</h2>
        <p>Restricted Store Access</p>
        <form method="POST" action="/admin-login">
            <input type="text" name="username" placeholder="Admin Username" required>
            <input type="password" name="password" placeholder="Admin Password" required>
            <button type="submit" class="btn-admin">Enter Dashboard</button>
        </form>
        <br>
        <a href="{{ url_for('login') }}" style="color: #95a5a6; text-decoration: none; font-size: 0.8rem;">← Back to Student Login</a>
    </div>
</body>
</html>
