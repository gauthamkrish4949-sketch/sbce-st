<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard | SBCE Store</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; padding: 20px; }
        .admin-container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logout { color: #e74c3c; text-decoration: none; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; border-bottom: 1px solid #eee; text-align: left; }
        th { background-color: #2c3e50; color: white; }
        .btn { padding: 8px 12px; border-radius: 5px; color: white; text-decoration: none; border: none; cursor: pointer; }
        .btn-view { background: #3498db; }
        .btn-deliver { background: #27ae60; }
    </style>
</head>
<body>
<div class="admin-container">
    <div class="header">
        <h1>Admin Order Management</h1>
        <a href="{{ url_for('logout') }}" class="logout">Logout</a>
    </div>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Student</th>
                <th>Items</th>
                <th>Proof</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for order in orders %}
            <tr>
                <td>#{{ order.id }}</td>
                <td>{{ order.name }}</td>
                <td>{{ order.purchased_items }}</td>
                <td>
                    {% if order.screenshot %}
                        <a href="{{ url_for('static', filename='uploads/' + order.screenshot) }}" target="_blank" class="btn btn-view">View Proof</a>
                    {% else %}
                        <span style="color:gray">No Upload</span>
                    {% endif %}
                </td>
                <td>{{ order.status }}</td>
                <td>
                    <form action="{{ url_for('deliver_order', order_id=order.id) }}" method="POST">
                        <button type="submit" class="btn btn-deliver">Mark Delivered</button>
                    </form>
                </td>
            </tr>
            {% else %}
            <tr><td colspan="6" style="text-align:center;">No orders found.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>
