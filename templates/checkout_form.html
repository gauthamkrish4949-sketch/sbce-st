<!DOCTYPE html>
<html>
<head>
    <title>Checkout | Uni Store SBCE</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .checkout-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #34495e; }
        input, select { width: 100%; padding: 12px; border: 1px solid #dcdde1; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        
        /* Row for Semester and Class */
        .form-row { display: flex; gap: 15px; }
        .form-row .form-group { flex: 1; }

        .payment-options { display: flex; gap: 15px; margin-top: 10px; background: #f9f9f9; padding: 15px; border-radius: 10px; }
        .pay-option { display: flex; align-items: center; cursor: pointer; font-weight: normal; font-size: 0.9rem; }
        .pay-option input { width: auto; margin-right: 8px; }

        .btn-confirm { width: 100%; padding: 15px; background-color: #2ecc71; color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-confirm:hover { background-color: #27ae60; }
    </style>
</head>
<body>

<div class="checkout-card">
    <h2>Order Details</h2>
    <form method="POST" action="/checkout">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="student_name" placeholder="Enter your name" required>
        </div>

        <div class="form-group">
            <label>Department</label>
            <select name="department">
                <option value="CSE">Computer Science</option>
                <option value="ECE">Electronics</option>
                <option value="ME">Mechanical</option>
                <option value="CE">Civil</option>
            </select>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Semester</label>
                <select name="semester">
                    <option value="S1">S1</option><option value="S2">S2</option>
                    <option value="S3">S3</option><option value="S4">S4</option>
                    <option value="S5">S5</option><option value="S6">S6</option>
                    <option value="S7">S7</option><option value="S8">S8</option>
                </select>
            </div>
            <div class="form-group">
                <label>Class/Section</label>
                <input type="text" name="class_section" placeholder="A, B, or C" required>
            </div>
        </div>

        <div class="form-group">
            <label>Payment Method</label>
            <div class="payment-options">
                <label class="pay-option">
                    <input type="radio" name="payment_method" value="UPI" checked> 📱 UPI Online
                </label>
                <label class="pay-option">
                    <input type="radio" name="payment_method" value="COD"> 💵 Cash on Counter
                </label>
            </div>
        </div>

        <button type="submit" class="btn-confirm">Place Order</button>
    </form>
</div>

</body>
</html>
