<!DOCTYPE html>
<html>
<head>
    <title>UPI Payment | SBCE Store</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; padding: 40px; }
        .pay-card { background: #2d2d2d; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; max-width: 400px; border: 1px solid #444; }
        .qr-img { width: 100%; max-width: 280px; border-radius: 15px; margin: 20px 0; border: 3px solid #5f259f; }
        .amount-badge { font-size: 2.2rem; font-weight: bold; color: #a29bfe; margin: 15px 0; }
        .upload-area { margin-top: 25px; border: 2px dashed #5f259f; padding: 20px; border-radius: 12px; background: #3d3d3d; }
        .btn-confirm { width: 100%; padding: 15px; background: #5f259f; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1.1rem; }
        .btn-confirm:hover { background: #7b39d1; }
    </style>
</head>
<body>
    <div class="pay-card">
        <h2 style="margin-top:0;">Complete Payment</h2>
        <p style="color: #bbb;">Payable to: <strong>Gautham Krishna</strong></p>
        
        <div class="amount-badge">₹{{ order.total }}</div>
        
        <img src="{{ url_for('static', filename='qr_code.jpg') }}" class="qr-img" alt="PhonePe QR">
        
        <p style="font-size: 0.9rem; color: #aaa;">Scan with PhonePe, GPay, or any UPI App</p>

        <form method="POST" enctype="multipart/form-data">
            <div class="upload-area">
                <label style="display: block; margin-bottom: 10px; font-weight: bold;">Upload Transaction Screenshot</label>
                <input type="file" name="payment_screenshot" required style="color: #ccc;">
            </div>
            <button type="submit" class="btn-confirm">Submit Payment Proof</button>
        </form>
    </div>
</body>
</html>
