<!DOCTYPE html>
<html>
<head>
    <title>Login | SBCE Store</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #f4f7f6; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .login-card { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            width: 350px; 
            text-align: center; 
        }
        h2 { color: #2c3e50; margin-bottom: 20px; }
        
        /* Error Message Style */
        .error-box {
            background-color: #fee2e2;
            color: #b91c1c;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            border: 1px solid #fecaca;
        }

        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 1rem;
        }
        .btn { 
            width: 100%; 
            padding: 12px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 10px; 
            display: block; 
            text-decoration: none; 
            transition: 0.2s;
        }
        .btn-student { 
            background: #3498db; 
            color: white; 
        }
        .btn-student:hover { background: #2980b9; }

        .btn-admin-link { 
            background: #f8fafc; 
            color: #64748b; 
            margin-top: 25px; 
            font-size: 0.85rem; 
            border: 1px solid #e2e8f0; 
        }
        .btn-admin-link:hover { 
            background: #f1f5f9; 
            color: #334155; 
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Student Login</h2>

        <!-- Flash/Error Message Logic -->
        {% if error %}
        <div class="error-box">
            ⚠️ {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login">
            <input type="text" name="username" placeholder="Enter Student ID" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn btn-student">Login to Store</button>
        </form>

        <hr style="margin: 25px 0; border: 0; border-top: 1px solid #eee;">
        
        <a href="{{ url_for('admin_login') }}" class="btn btn-admin-link">Staff / Admin Portal</a>
    </div>
</body>
</html>
